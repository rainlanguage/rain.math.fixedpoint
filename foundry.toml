[package]
name = "rain-math-fixedpoint"
version = "0.2.0"

[profile.default]
libs = ["dependencies"]
# See more config options https://github.com/foundry-rs/foundry/tree/master/config

solc = "0.8.25"
optimizer = true
optimizer_runs = 100000

evm_version = "cancun"

fuzz.runs = 1024

[dependencies]
forge-std = "1.16.1"
"@openzeppelin-contracts" = "5.6.1"
"rain-math-saturating" = "0.1.1"
"rain-string" = "0.2.0"

[soldeer]
recursive_deps = false
